image: node:20

variables:
  ISSUE_FLOW_PROVIDER: gitlab
  ISSUE_FLOW_RUNTIME: agentrix

.issue-flow-runner:
  tags:
    - issue-flow

issue-flow-labels:
  extends: .issue-flow-runner
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes:
        - .agentrix/plugins/issue-flow/**/*
        - .issue-flow/**/*
        - .gitlab/issue-flow.gitlab-ci.yml
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/sync-labels.cjs "$@"

issue-flow-milestones:
  extends: .issue-flow-runner
  stage: build
  rules:
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "create" || $GITLAB_BRIDGE_EVENT_NAME == "delete"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then set -- "$@" --repo "$CI_PROJECT_PATH"; fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/cli.cjs milestone sync "$@"

issue-flow-auto:
  extends: .issue-flow-runner
  stage: build
  resource_group: "issue-flow-auto-${CI_PROJECT_ID}-${GITLAB_BRIDGE_ISSUE_NUMBER}"
  rules:
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "issues" && ($GITLAB_BRIDGE_LABELS_JSON =~ /failure::ci/ || $GITLAB_BRIDGE_LABELS =~ /failure::ci/ || $GITLAB_BRIDGE_ISSUE_TITLE =~ /^Fix CI failure:/)'
      when: never
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "issues" && $GITLAB_BRIDGE_EVENT_ACTION == "opened"'
      when: on_success
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "issues" && $GITLAB_BRIDGE_EVENT_ACTION == "labeled"'
      when: on_success
    - if: '$GITLAB_EVENT_NAME == "issue"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ "${GITLAB_BRIDGE_EVENT_ACTION:-}" = "opened" ] && [ -n "${GITLAB_BRIDGE_ISSUE_NUMBER:-}" ]; then
        node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/intake.cjs --issue-number "$GITLAB_BRIDGE_ISSUE_NUMBER" "$@"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs auto "$@"

issue-flow-comment:
  extends: .issue-flow-runner
  stage: build
  rules:
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "issue_comment" && $GITLAB_BRIDGE_ISSUE_NUMBER && $GITLAB_BRIDGE_COMMENT_BODY =~ /(^|[^A-Za-z0-9._-])(@agentrix|\/agentrix)($|[^A-Za-z0-9._-])/'
      when: on_success
    - if: '$GITLAB_EVENT_NAME == "note"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs comment "$@"

issue-flow-merged:
  extends: .issue-flow-runner
  stage: build
  rules:
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "pull_request" && $GITLAB_BRIDGE_EVENT_ACTION == "closed" && $GITLAB_BRIDGE_PULL_REQUEST_MERGED == "true"'
      when: on_success
    - if: '$CI_MERGE_REQUEST_EVENT_TYPE == "merged"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      git fetch origin "${CI_DEFAULT_BRANCH:-main}" --depth 1
      git checkout FETCH_HEAD -- .agentrix/plugins/issue-flow .issue-flow
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs pr-merged "$@"

issue-flow-review:
  extends: .issue-flow-runner
  stage: build
  rules:
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && $GITLAB_BRIDGE_EVENT_NAME == "pull_request" && $GITLAB_BRIDGE_EVENT_ACTION == "opened"'
      when: on_success
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && $GITLAB_BRIDGE_EVENT_NAME == "pull_request" && $GITLAB_BRIDGE_EVENT_ACTION == "synchronize"'
      when: on_success
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && $GITLAB_BRIDGE_EVENT_NAME == "pull_request" && $GITLAB_BRIDGE_EVENT_ACTION == "ready_for_review"'
      when: on_success
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && $GITLAB_BRIDGE_PR_NUMBER'
      when: manual
    - when: never
  script:
    - |
      set -eu
      git fetch origin "${CI_DEFAULT_BRANCH:-main}" --depth 1
      git checkout FETCH_HEAD -- .agentrix/plugins/issue-flow .issue-flow
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      elif [ -z "${GITLAB_BRIDGE_EVENT_NAME:-}" ]; then
        if [ -z "${GITLAB_BRIDGE_PR_NUMBER:-}" ]; then
          echo "GITLAB_BRIDGE_PR_NUMBER is required for manual issue-flow-review" >&2
          exit 1
        fi
        set -- "$@" --pr-number "$GITLAB_BRIDGE_PR_NUMBER"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs review "$@"

issue-flow-review-comment:
  extends: .issue-flow-runner
  stage: build
  rules:
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "pull_request_review_comment" && $GITLAB_BRIDGE_EVENT_ACTION == "created"'
      when: on_success
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "issue_comment" && $GITLAB_BRIDGE_PR_NUMBER && $GITLAB_BRIDGE_EVENT_ACTION == "created"'
      when: on_success
    - if: '$GITLAB_EVENT_NAME == "note"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      git fetch origin "${CI_DEFAULT_BRANCH:-main}" --depth 1
      git checkout FETCH_HEAD -- .agentrix/plugins/issue-flow .issue-flow
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/cli.cjs dispatch review-comment "$@"
