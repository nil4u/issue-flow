services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: issue_flow
      POSTGRES_PASSWORD: issue_flow
      POSTGRES_DB: issue_flow
    ports:
      - "5432:5432"
    volumes:
      - issue-flow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U issue_flow -d issue_flow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  issue-flow-postgres:
