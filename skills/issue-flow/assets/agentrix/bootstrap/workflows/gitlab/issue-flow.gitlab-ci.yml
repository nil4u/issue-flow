image: node:20

variables:
  ISSUE_FLOW_PROVIDER: gitlab
  ISSUE_FLOW_RUNTIME: agentrix

issue-flow-labels:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes:
        - .agentrix/plugins/issue-flow/**/*
        - .gitlab-ci.yml
        - .gitlab/issue-flow.gitlab-ci.yml
        - .issue-flow/**/*
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/sync-labels.cjs "$@"

issue-flow-auto:
  rules:
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "issues" && ($GITLAB_BRIDGE_LABELS_JSON =~ /failure::ci/ || $GITLAB_BRIDGE_LABELS =~ /failure::ci/ || $GITLAB_BRIDGE_ISSUE_TITLE =~ /^Fix CI failure:/)'
      when: never
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "issues" && ($AGENTRIX_LABELS_JSON =~ /failure::ci/ || $AGENTRIX_LABELS =~ /failure::ci/ || $AGENTRIX_ISSUE_TITLE =~ /^Fix CI failure:/)'
      when: never
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "issues" && $GITLAB_BRIDGE_EVENT_ACTION == "opened"'
      when: on_success
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "issues" && $GITLAB_BRIDGE_EVENT_ACTION == "labeled"'
      when: on_success
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "issues" && $AGENTRIX_EVENT_ACTION == "opened"'
      when: on_success
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "issues" && $AGENTRIX_EVENT_ACTION == "labeled"'
      when: on_success
    - if: '$GITLAB_EVENT_NAME == "issue"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      bridge_event_action="${GITLAB_BRIDGE_EVENT_ACTION:-${AGENTRIX_EVENT_ACTION:-}}"
      bridge_issue_number="${GITLAB_BRIDGE_ISSUE_NUMBER:-${AGENTRIX_ISSUE_NUMBER:-}}"
      if [ "$bridge_event_action" = "opened" ] && [ -n "$bridge_issue_number" ]; then
        node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/intake.cjs --issue-number "$bridge_issue_number" "$@"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs auto "$@"

issue-flow-comment:
  rules:
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "issue_comment" && $GITLAB_BRIDGE_ISSUE_NUMBER && $GITLAB_BRIDGE_COMMENT_BODY =~ /(^|[^A-Za-z0-9._-])(@agentrix|\/agentrix)($|[^A-Za-z0-9._-])/'
      when: on_success
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "issue_comment" && $AGENTRIX_SUBJECT_KIND == "issue" && $AGENTRIX_COMMENT_COMMAND == "true"'
      when: on_success
    - if: '$GITLAB_EVENT_NAME == "note"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs comment "$@"

issue-flow-merged:
  rules:
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "pull_request" && $GITLAB_BRIDGE_EVENT_ACTION == "closed" && $GITLAB_BRIDGE_PULL_REQUEST_MERGED == "true"'
      when: on_success
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "pull_request" && $AGENTRIX_EVENT_ACTION == "closed" && $AGENTRIX_PULL_REQUEST_MERGED == "true"'
      when: on_success
    - if: '$CI_MERGE_REQUEST_EVENT_TYPE == "merged"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      git fetch origin "${CI_DEFAULT_BRANCH:-main}" --depth 1
      git checkout FETCH_HEAD -- .agentrix/plugins/issue-flow .issue-flow
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs pr-merged "$@"

issue-flow-review:
  rules:
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && $GITLAB_BRIDGE_EVENT_NAME == "pull_request" && $GITLAB_BRIDGE_EVENT_ACTION == "opened"'
      when: on_success
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && $GITLAB_BRIDGE_EVENT_NAME == "pull_request" && $GITLAB_BRIDGE_EVENT_ACTION == "synchronize"'
      when: on_success
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && $GITLAB_BRIDGE_EVENT_NAME == "pull_request" && $GITLAB_BRIDGE_EVENT_ACTION == "ready_for_review"'
      when: on_success
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && $AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "pull_request" && $AGENTRIX_EVENT_ACTION == "opened"'
      when: on_success
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && $AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "pull_request" && $AGENTRIX_EVENT_ACTION == "synchronize"'
      when: on_success
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && $AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "pull_request" && $AGENTRIX_EVENT_ACTION == "ready_for_review"'
      when: on_success
    - if: '$ISSUE_FLOW_REVIEW_ENABLED =~ /^(true|1)$/ && ($GITLAB_BRIDGE_PR_NUMBER || $AGENTRIX_PR_NUMBER)'
      when: manual
    - when: never
  script:
    - |
      set -eu
      git fetch origin "${CI_DEFAULT_BRANCH:-main}" --depth 1
      git checkout FETCH_HEAD -- .agentrix/plugins/issue-flow .issue-flow
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      elif [ -z "${GITLAB_BRIDGE_EVENT_NAME:-}" ] && [ "${AGENTRIX_TRIGGER_SOURCE:-}" != "agentrix_daemon_webhook" ]; then
        bridge_pr_number="${GITLAB_BRIDGE_PR_NUMBER:-${AGENTRIX_PR_NUMBER:-}}"
        if [ -z "$bridge_pr_number" ]; then
          echo "GITLAB_BRIDGE_PR_NUMBER or AGENTRIX_PR_NUMBER is required for manual issue-flow-review" >&2
          exit 1
        fi
        set -- "$@" --pr-number "$bridge_pr_number"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs review "$@"

issue-flow-review-comment:
  rules:
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "pull_request_review_comment" && $GITLAB_BRIDGE_EVENT_ACTION == "created"'
      when: on_success
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "issue_comment" && $GITLAB_BRIDGE_PR_NUMBER && $GITLAB_BRIDGE_EVENT_ACTION == "created"'
      when: on_success
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "pull_request_review_comment" && $AGENTRIX_EVENT_ACTION == "created"'
      when: on_success
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "issue_comment" && $AGENTRIX_SUBJECT_KIND == "pull_request" && $AGENTRIX_EVENT_ACTION == "created"'
      when: on_success
    - if: '$GITLAB_EVENT_NAME == "note"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      git fetch origin "${CI_DEFAULT_BRANCH:-main}" --depth 1
      git checkout FETCH_HEAD -- .agentrix/plugins/issue-flow .issue-flow
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/cli.cjs dispatch review-comment "$@"

issue-flow-failure-intake:
  rules:
    - if: '$GITLAB_BRIDGE_EVENT_NAME == "workflow_run" && $GITLAB_BRIDGE_EVENT_ACTION == "completed" && $GITLAB_BRIDGE_WORKFLOW_RUN_CONCLUSION == "failure"'
      when: on_success
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "workflow_run" && $AGENTRIX_EVENT_ACTION == "completed" && $AGENTRIX_WORKFLOW_RUN_CONCLUSION == "failure"'
      when: on_success
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "workflow_run" && $AGENTRIX_EVENT_ACTION == "completed" && $AGENTRIX_PIPELINE_STATUS == "failed"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      if [ -n "${ISSUE_FLOW_FAILURE_LOG_FILE:-}" ]; then
        set -- "$@" --log-file "$ISSUE_FLOW_FAILURE_LOG_FILE"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/cli.cjs dispatch pipeline-failed "$@"
