image: node:20

variables:
  ISSUE_FLOW_PROVIDER: gitlab
  ISSUE_FLOW_RUNTIME: agentrix

issue-flow-auto:
  rules:
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "issues" && $AGENTRIX_EVENT_ACTION == "opened"'
      when: on_success
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "issues" && $AGENTRIX_EVENT_ACTION == "labeled"'
      when: on_success
    - if: '$GITLAB_EVENT_NAME == "issue"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ "${AGENTRIX_EVENT_ACTION:-}" = "opened" ] && [ -n "${AGENTRIX_ISSUE_NUMBER:-}" ]; then
        node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/intake.cjs --issue-number "$AGENTRIX_ISSUE_NUMBER" "$@"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs auto "$@"

issue-flow-comment:
  rules:
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "issue_comment" && $AGENTRIX_SUBJECT_KIND == "issue" && $AGENTRIX_COMMENT_COMMAND == "true"'
      when: on_success
    - if: '$GITLAB_EVENT_NAME == "note"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs comment "$@"

issue-flow-merged:
  rules:
    - if: '$AGENTRIX_TRIGGER_SOURCE == "agentrix_daemon_webhook" && $AGENTRIX_PROVIDER == "gitlab" && $AGENTRIX_EVENT_NAME == "pull_request" && $AGENTRIX_EVENT_ACTION == "closed" && $AGENTRIX_PULL_REQUEST_MERGED == "true"'
      when: on_success
    - if: '$CI_MERGE_REQUEST_EVENT_TYPE == "merged"'
      when: on_success
    - when: never
  script:
    - |
      set -eu
      set -- --provider gitlab
      if [ -n "${CI_PROJECT_PATH:-}" ]; then
        set -- "$@" --repo "$CI_PROJECT_PATH"
      fi
      if [ -n "${GITLAB_EVENT_PATH:-}" ]; then
        set -- "$@" --event "$GITLAB_EVENT_PATH"
      fi
      node .agentrix/plugins/issue-flow/skills/issue-flow/scripts/dispatch.cjs pr-merged "$@"
