name: Issue Flow Failure Intake

on:
  workflow_run:
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: issue-flow-failure-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  analyze:
    if: github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout issue-flow files
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            .agentrix/plugins/issue-flow
            .issue-flow

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Analyze failed workflow run
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node .agentrix/plugins/issue-flow/skills/issue-flow/cli.cjs dispatch pipeline-failed --event "$GITHUB_EVENT_PATH" --provider github --repo "${{ github.repository }}"
