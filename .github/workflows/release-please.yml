# [INPUT]: 依赖 main push/workflow_dispatch、release-please-config.json 与 .release-please-manifest.json
# [OUTPUT]: 创建或更新 release PR；release PR 合并后创建 GitHub Release/tag；console release 同步发布 GHCR 镜像
# [POS]: workflows 的发布自动化入口，固定从 main 维护 package.json、SKILL.md、CHANGELOG、manifest 与 tag
# [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md

name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: release-please-main
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-console

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_created: ${{ steps.release.outputs['console/api--release_created'] }}
      tag_name: ${{ steps.release.outputs['console/api--tag_name'] }}

    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker-prepare:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      version: ${{ needs.release-please.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest
            type=sha

  docker-publish:
    needs:
      - release-please
      - docker-prepare
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/console-image-publish.yml
    secrets: inherit
    with:
      image_name: ghcr.io/${{ github.repository }}-console
      tags: ${{ needs.docker-prepare.outputs.tags }}
      labels: ${{ needs.docker-prepare.outputs.labels }}
      version: ${{ needs.docker-prepare.outputs.version }}
