# [INPUT]: 依赖 console-v* tag/workflow_dispatch、console/Dockerfile、根 package-lock.json、plugin 打包源
# [OUTPUT]: 构建 issue-flow console 镜像并推送到 GitHub Container Registry
# [POS]: console release 镜像发布入口，固定把同版本 plugin 打进镜像
# [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md

name: Console Docker Image

on:
  push:
    tags:
      - "console-v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to publish, for example console-v0.2.0"
        required: false
        type: string
      latest:
        description: "Also publish latest"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: console-docker-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-console

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/console-v') }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.latest }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: console/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
