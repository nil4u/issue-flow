# [INPUT]: 依赖 console-v* tag/workflow_dispatch、console/Dockerfile、根 package-lock.json、plugin 打包源
# [OUTPUT]: 构建 issue-flow console 镜像并推送到 GitHub Container Registry
# [POS]: console release 镜像发布入口，固定把同版本 plugin 打进镜像
# [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md

name: Console Docker Image

on:
  push:
    tags:
      - "console-v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to publish, for example console-v0.2.0"
        required: false
        type: string
      latest:
        description: "Also publish latest"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: console-docker-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-console

jobs:
  prepare:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/console-v') }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.latest }}
            type=sha

      - name: Image version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            printf 'version=%s\n' "${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/console-v* ]]; then
            printf 'version=%s\n' "${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            printf 'version=sha-%s\n' "$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: prepare
    uses: ./.github/workflows/console-image-publish.yml
    secrets: inherit
    with:
      image_name: ghcr.io/${{ github.repository }}-console
      tags: ${{ needs.prepare.outputs.tags }}
      labels: ${{ needs.prepare.outputs.labels }}
      version: ${{ needs.prepare.outputs.version }}
