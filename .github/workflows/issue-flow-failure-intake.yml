name: Issue Flow Failure Intake

on:
  workflow_run:
    workflows:
      - 'Issue Flow Auto'
      - 'Issue Flow Comment'
      - 'Issue Flow Labels'
      - 'Issue Flow PR Merged'
      - 'Issue Flow PR Review Comment'
      - 'Issue Flow PR Review'
      - 'Release Please'
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: issue-flow-failure-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  analyze:
    if: (github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out') && github.event.workflow_run.name != 'Issue Flow Failure Intake'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout issue-flow files
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            .agentrix/plugins/issue-flow
            .issue-flow

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Analyze failed workflow run
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AGENTRIX_BASE_URL: ${{ vars.AGENTRIX_BASE_URL }}
          AGENTRIX_API_KEY: ${{ secrets.AGENTRIX_API_KEY }}
          AGENTRIX_RUNNER_ID: ${{ vars.AGENTRIX_RUNNER_ID }}
          AGENTRIX_ISSUE_FLOW_AGENT: ${{ vars.AGENTRIX_ISSUE_FLOW_AGENT }}
        run: node .agentrix/plugins/issue-flow/skills/issue-flow/cli.cjs dispatch pipeline-failed --event "$GITHUB_EVENT_PATH" --provider github --repo "${{ github.repository }}"
